name: Release

# Cut a release by pushing a version tag (e.g. `git tag v0.1.0 && git push --tags`).
# CI runs the full gate, publishes to npm with provenance, and creates the GitHub Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release from the tag
  id-token: write # npm provenance + OIDC Trusted Publishing (no NPM_TOKEN needed)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check # typecheck + build + test + lint
      - run: npm install -g npm@latest # provenance + Trusted Publishing need a recent npm
      - run: npm publish --provenance --access public
        # Auth via npm Trusted Publishing (OIDC) — configure once on npmjs.com, no secret.
        # Token fallback: add an NPM_TOKEN repo secret and uncomment the env block.
        # env:
        #   NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
